# Redis — khớp OCP hiện tại (shared banking + CineHome)
# Chart: bitnami/redis 20.6.2 | release: redis-ha | Sentinel HA 3 node
# Secret cluster: redis-ha / key redis-password  (KHÔNG đổi tên — banking đang dùng)
architecture: replication

auth:
  enabled: true
  existingSecret: redis-ha
  existingSecretPasswordKey: redis-password

sentinel:
  enabled: true
  quorum: 2

master:
  persistence:
    enabled: true
    storageClass: nfs-csi
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 150m
      memory: 192Mi

replica:
  replicaCount: 3
  persistence:
    enabled: true
    storageClass: nfs-csi
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 150m
      memory: 192Mi

metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi
