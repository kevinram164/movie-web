# CineHome — Harbor k8s-pull (tách khỏi banking `platform/harbor-pull`)
# Vault: secret/cinehome/harbor-pull → K8s secret harbor-pull-creds (ns npd-movie)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-pull-creds
  namespace: npd-movie
  labels:
    app.kubernetes.io/part-of: cinehome
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-pull-creds
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: '{{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .registry .username .password (printf "%s:%s" .username .password | b64enc) }}'
  data:
    - secretKey: registry
      remoteRef:
        key: cinehome/harbor-pull
        property: registry
    - secretKey: username
      remoteRef:
        key: cinehome/harbor-pull
        property: username
    - secretKey: password
      remoteRef:
        key: cinehome/harbor-pull
        property: password
