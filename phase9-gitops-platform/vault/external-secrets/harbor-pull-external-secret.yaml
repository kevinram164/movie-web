# Harbor k8s-pull → docker-registry secret harbor-pull-creds
# Namespace: npd-movie (CineHome) + platform
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-pull-creds
  namespace: npd-movie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-pull-creds
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: '{{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .registry .username .password (printf "%s:%s" .username .password | b64enc) }}'
  data:
    - secretKey: registry
      remoteRef:
        key: platform/harbor-pull
        property: registry
    - secretKey: username
      remoteRef:
        key: platform/harbor-pull
        property: username
    - secretKey: password
      remoteRef:
        key: platform/harbor-pull
        property: password

