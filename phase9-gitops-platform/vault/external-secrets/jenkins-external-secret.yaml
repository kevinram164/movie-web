# Jenkins admin + webhook — sync từ Vault secret/platform/jenkins
# Harbor/GitHub CI: pipeline đọc trực tiếp Vault (platform/harbor, platform/github) — không qua Jenkins credential
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-platform-credentials
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jenkins-platform-credentials
    creationPolicy: Owner
  data:
    - secretKey: jenkins-admin-user
      remoteRef:
        key: platform/jenkins
        property: admin_username
    - secretKey: jenkins-admin-password
      remoteRef:
        key: platform/jenkins
        property: admin_password
