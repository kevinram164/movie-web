# Harbor registry CA — Vault secret/platform/harbor-registry-ca
# → Secret harbor-registry-ca-vault (ns openshift-config)
#
# OpenShift Image Config chỉ nhận ConfigMap (không đọc Vault/Secret trực tiếp).
# Sau ESO sync, chạy harbor-registry-trust-setup.sh để materialize ConfigMap + patch image.config.
#
# Seed Vault (từ router-ca trên cluster):
#   ./environments/dev-ocp/scripts/vault-seed-harbor-registry-ca.sh
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-registry-ca
  namespace: openshift-config
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    app.kubernetes.io/component: harbor-registry-trust
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-registry-ca-vault
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          app.kubernetes.io/part-of: phase9-gitops
          app.kubernetes.io/component: harbor-registry-trust
      data:
        ca.crt: "{{ .cacrt }}"
        registry_host: "{{ .registry_host }}"
  data:
    - secretKey: cacrt
      remoteRef:
        key: platform/harbor-registry-ca
        property: ca.crt
    - secretKey: registry_host
      remoteRef:
        key: platform/harbor-registry-ca
        property: registry_host
