# ESO → Secret cloudflared-token (ns npd-movie)
# Vault: secret/cinehome/cloudflared  (property: token)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-token
  labels:
    app.kubernetes.io/part-of: cinehome
    app.kubernetes.io/component: tunnel
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflared-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: cinehome/cloudflared
        property: token
