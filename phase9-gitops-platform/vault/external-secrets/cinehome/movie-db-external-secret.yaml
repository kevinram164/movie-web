# ESO → Secret cinehome-movie-db (ns postgres) — CHỈ password user `movie`
# KHÔNG đụng Secret postgres-ha-postgresql (banking đang dùng)
# Vault: secret/cinehome/movie-db
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cinehome-movie-db
  labels:
    app.kubernetes.io/part-of: cinehome
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cinehome-movie-db
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: cinehome/movie-db
        property: password
    - secretKey: username
      remoteRef:
        key: cinehome/movie-db
        property: username
    - secretKey: database
      remoteRef:
        key: cinehome/movie-db
        property: database
