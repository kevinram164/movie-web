# ESO → Secret cinehome-app-secrets (ns npd-movie)
# Vault: secret/cinehome/app
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cinehome-app-secrets
  labels:
    app.kubernetes.io/part-of: cinehome
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cinehome-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: cinehome/app
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: cinehome/app
        property: REDIS_URL
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: cinehome/app
        property: MINIO_ACCESS_KEY
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: cinehome/app
        property: MINIO_SECRET_KEY
