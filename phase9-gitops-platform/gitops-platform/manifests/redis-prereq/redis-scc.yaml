# SCC cho Bitnami Redis — chart cố định UID/fsGroup 1001 (cùng mô hình MinIO / Postgres)
# Không dùng restricted-v2 + NFS (UID dải namespace ≠ owner data trên share)
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: redis-uid1001
  labels:
    cinehome/environment: dev-ocp
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: null
defaultAddCapabilities: null
requiredDropCapabilities:
  - MKNOD
runAsUser:
  type: MustRunAs
  uid: 1001
runAsGroup:
  type: MustRunAs
  ranges:
    - min: 1001
      max: 1001
fsGroup:
  type: MustRunAs
  ranges:
    - min: 1001
      max: 1001
supplementalGroups:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
  - runtime/default
  - localhost/*
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - csi
users:
  - system:serviceaccount:redis:redis-ha
  - system:serviceaccount:redis:default
