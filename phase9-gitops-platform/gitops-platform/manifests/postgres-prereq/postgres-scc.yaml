# SCC cho Bitnami PostgreSQL — chart cố định UID/fsGroup 1001 + seccomp runtime/default
# (restricted-v2 gán UID dải namespace → NFS data owner 1001 bị Permission denied;
#  fsGroup trên NFS không đáng tin — AUTH_SYS thường không gửi supplemental groups)
# Chỉ gán SA postgres — không anyuid cả namespace.
# Apply / Argo: sync-wave -1 trước chart postgres-ha
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: postgres-uid1001
  labels:
    cinehome/environment: dev-ocp
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: null
defaultAddCapabilities: null
requiredDropCapabilities:
  - MKNOD
runAsUser:
  type: MustRunAs
  uid: 1001
runAsGroup:
  type: MustRunAs
  ranges:
    - min: 1001
      max: 1001
fsGroup:
  type: MustRunAs
  ranges:
    - min: 1001
      max: 1001
supplementalGroups:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
  - runtime/default
  - localhost/*
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - csi
users:
  - system:serviceaccount:postgres:postgres-ha-postgresql
  - system:serviceaccount:postgres:default
