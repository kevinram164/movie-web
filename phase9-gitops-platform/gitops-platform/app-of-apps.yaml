# Root App of Apps — Phase 9
# Bootstrap: kubectl apply -f phase9-gitops-platform/gitops-platform/app-of-apps.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cinehome-platform-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cinehome-platform
  source:
    repoURL: https://github.com/kevinram164/movie-web.git
    targetRevision: main
    path: phase9-gitops-platform/gitops-platform/applications
    directory:
      include: "*-app-of-apps.yaml"
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
