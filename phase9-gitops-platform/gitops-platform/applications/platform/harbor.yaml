# Harbor — dev-ocp: harbor-platform.apps.ocp01.npd.co
# Xem harbor/README.md: TLS, admin password, robot accounts
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-harbor
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: cinehome-platform
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.15.0
    helm:
      releaseName: harbor
      values: |
        expose:
          type: clusterIP
          tls:
            enabled: false
        externalURL: https://harbor-platform.apps.ocp01.npd.co
        harborAdminPassword: "ChangeMe-Harbor-Admin"
        internalTLS:
          enabled: false
        # OCP: Harbor image dùng UID 999/10000 — SA harbor + SCC harbor-uid-range (harbor-scc-setup.sh)
        nginx:
          serviceAccountName: harbor
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
        portal:
          serviceAccountName: harbor
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
        core:
          serviceAccountName: harbor
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          startupProbe:
            enabled: true
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 36
          livenessProbe:
            initialDelaySeconds: 60
        jobservice:
          serviceAccountName: harbor
          maxJobWorkers: 2
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
        registry:
          serviceAccountName: harbor
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
        trivy:
          enabled: false
        database:
          type: internal
          internal:
            serviceAccountName: harbor
            password: "ChangeMe-Harbor-DB"
            shmSizeLimit: 256Mi
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
        redis:
          type: internal
          internal:
            serviceAccountName: harbor
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
        persistence:
          enabled: true
          persistentVolumeClaim:
            registry:
              storageClass: nfs-csi
              size: 10Gi
            jobservice:
              jobLog:
                storageClass: nfs-csi
                size: 1Gi
            database:
              storageClass: nfs-csi
              size: 2Gi
            redis:
              storageClass: nfs-csi
              size: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
