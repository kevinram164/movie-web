# Linkerd control-plane — mTLS service mesh
# Identity TLS: wave 0 bootstrap (secret + configmap) + externalCA:true bên dưới
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-linkerd-control-plane
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    app.kubernetes.io/component: observability
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: cinehome-platform
  sources:
    - repoURL: https://helm.linkerd.io/stable
      chart: linkerd-control-plane
      targetRevision: 1.16.11
      helm:
        releaseName: linkerd-control-plane
        valueFiles:
          - $values/phase9-gitops-platform/observability/values-linkerd-ocp.yaml
        values: |
          identity:
            externalCA: true
            issuer:
              scheme: kubernetes.io/tls
          # OCP: RHCOS dùng nftables — không để default iptables-legacy
          proxyInit:
            iptablesMode: nft
            runAsRoot: true
    - repoURL: https://github.com/kevinram164/movie-web.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: linkerd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
