# Linkerd CRDs — service mesh (wave 0)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-linkerd-crds
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    app.kubernetes.io/component: observability
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: cinehome-platform
  source:
    repoURL: https://helm.linkerd.io/stable
    chart: linkerd-crds
    targetRevision: 1.8.0
    helm:
      releaseName: linkerd-crds
      values: |
        # OpenShift có thể đã cài Gateway API CRDs — tránh xung đột storedVersions
        enableHttpRoutes: false
        enableTlsRoutes: false
        enableTcpRoutes: false
  destination:
    server: https://kubernetes.default.svc
    namespace: linkerd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
