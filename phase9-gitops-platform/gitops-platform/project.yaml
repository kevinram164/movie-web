# ArgoCD AppProject — CineHome (OpenShift)
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cinehome-platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: cinehome-platform
    app.kubernetes.io/part-of: phase9-gitops
spec:
  description: "Phase 9 — CineHome CI/CD, infra, app, observability"
  sourceRepos:
    - https://github.com/kevinram164/movie-web.git
    - https://charts.bitnami.com/bitnami
    - oci://registry-1.docker.io/bitnamicharts
    - https://helm.releases.hashicorp.com
    - https://charts.external-secrets.io
    - https://helm.goharbor.io
    - https://charts.jenkins.io
    - https://coroot.github.io/helm-charts
    - https://open-telemetry.github.io/opentelemetry-helm-charts
    - https://helm.linkerd.io/stable
  destinations:
    - namespace: npd-movie
      server: https://kubernetes.default.svc
    - namespace: minio
      server: https://kubernetes.default.svc
    - namespace: kong
      server: https://kubernetes.default.svc
    - namespace: redis
      server: https://kubernetes.default.svc
    - namespace: postgres
      server: https://kubernetes.default.svc
    - namespace: platform
      server: https://kubernetes.default.svc
    - namespace: vault
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: observability
      server: https://kubernetes.default.svc
    - namespace: linkerd
      server: https://kubernetes.default.svc
    - namespace: linkerd-viz
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: openshift-config
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiregistration.k8s.io
      kind: APIService
    - group: coroot.com
      kind: "*"
    - group: policy.linkerd.io
      kind: "*"
    - group: linkerd.io
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
