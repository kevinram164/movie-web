# Root App of Apps — nhánh main (CineHome)
# Giai đoạn đầu: apply riêng platform → infra → (CI) → cinehome-app-of-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cinehome-platform-root-dev-ocp
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    cinehome/environment: dev-ocp
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cinehome-platform
  source:
    repoURL: https://github.com/kevinram164/movie-web.git
    targetRevision: main
    path: phase9-gitops-platform/environments/dev-ocp/argocd/applications
    directory:
      include: "*-app-of-apps.yaml"
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
