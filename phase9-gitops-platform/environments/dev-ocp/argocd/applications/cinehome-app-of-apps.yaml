# CineHome apps — apply SAU khi Harbor có image (Jenkins cinehomePipeline)
# Path trỏ deploy/argocd ở root repo movie-web
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cinehome-app-of-apps-dev-ocp
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: cinehome
    cinehome/environment: dev-ocp
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: cinehome-platform
  source:
    repoURL: https://github.com/kevinram164/movie-web.git
    targetRevision: main
    path: deploy/argocd
    directory:
      recurse: false
      exclude: "app-of-apps.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
