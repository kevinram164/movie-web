# OpenShift Routes — Harbor, Jenkins, Vault, ArgoCD, Coroot, Linkerd Viz
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-routes-dev-ocp
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    cinehome/environment: dev-ocp
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: cinehome-platform
  source:
    repoURL: https://github.com/kevinram164/movie-web.git
    targetRevision: main
    path: phase9-gitops-platform/environments/dev-ocp/ocp-values/routes
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
