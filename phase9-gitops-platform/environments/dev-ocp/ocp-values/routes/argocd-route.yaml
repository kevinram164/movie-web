# ArgoCD UI — upstream ArgoCD (ns argocd)
# Khuyến nghị lab: argocd-route-edge.yaml + server.insecure=true (xem INSTALL-ARGOCD-UPSTREAM.md §2b)
# Hoặc: argocd-route-reencrypt.yaml nếu không bật insecure
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: phase9-gitops
    cinehome/environment: dev-ocp
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  host: argocd-server-argocd.apps.ocp01.npd.co
  to:
    kind: Service
    name: argocd-server
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
