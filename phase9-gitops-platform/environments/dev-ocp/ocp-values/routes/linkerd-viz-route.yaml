# Linkerd Viz dashboard — OpenShift Route (thay oc expose thủ công)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: linkerd-viz-platform
  namespace: linkerd-viz
  labels:
    app.kubernetes.io/name: linkerd-viz
    app.kubernetes.io/part-of: phase9-gitops
    cinehome/environment: dev-ocp
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  host: linkerd-viz-platform.apps.ocp01.npd.co
  to:
    kind: Service
    name: web
    weight: 100
  port:
    targetPort: 8084
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
