# SCC hẹp — chỉ argocd-redis chạy UID 999 (không anyuid cả namespace)
# Apply: oc apply -f argocd-redis-scc.yaml
# SA phải khớp manifest ArgoCD upstream (argocd-redis)
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: argocd-redis-uid999
  labels:
    cinehome/environment: dev-ocp
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: null
defaultAddCapabilities: null
requiredDropCapabilities:
  - KILL
  - MCK
  - NET_BIND_SERVICE
  - SYS_CHROOT
  - SETUID
  - SETGID
runAsUser:
  type: MustRunAs
  uid: 999
runAsGroup:
  type: MustRunAs
  ranges:
    - min: 999
      max: 999
fsGroup:
  type: MustRunAs
  ranges:
    - min: 999
      max: 999
supplementalGroups:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
users:
  - system:serviceaccount:argocd:argocd-redis
