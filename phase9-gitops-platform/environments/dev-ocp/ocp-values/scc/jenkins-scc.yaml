# SCC hẹp — Jenkins controller UID 1000 (khớp jenkins.yaml podSecurityContextOverride)
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: jenkins-uid1000
  labels:
    cinehome/environment: dev-ocp
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: null
defaultAddCapabilities: null
runAsUser:
  type: MustRunAs
  uid: 1000
runAsGroup:
  type: MustRunAs
  ranges:
    - min: 1000
      max: 1000
fsGroup:
  type: MustRunAs
  ranges:
    - min: 1000
      max: 1000
supplementalGroups:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
users:
  - system:serviceaccount:platform:jenkins
