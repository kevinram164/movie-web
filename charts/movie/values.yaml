namespace: npd-movie

imagePullSecrets:
  - name: harbor-pull-creds

# Secrets từ Vault → ESO Secret cinehome-app-secrets (không password trong Git)
appSecretName: cinehome-app-secrets

movieApi:
  enabled: true
  replicaCount: 1
  image:
    repository: harbor-platform.apps.ocp01.npd.co/movie-web/movie-api
    tag: "latest"
    pullPolicy: Always
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Non-secret env only
  env:
    MINIO_ENDPOINT: "minio.minio.svc.cluster.local:9000"
    MINIO_SECURE: "false"
    MINIO_BUCKET_MOVIES: "movies"
    MINIO_BUCKET_POSTERS: "posters"
    MINIO_BUCKET_RAW: "raw"
    # Media proxy cùng origin (/media → MinIO nội bộ). KHÔNG expose MinIO ra Internet.
    MINIO_PUBLIC_URL: "/media"
    MEDIA_QUEUE: "cinehome:media:jobs"
    REDIS_SENTINEL_MASTER: "mymaster"
    REDIS_SENTINEL_PORT: "26379"
    CORS_ORIGINS: "https://cinehome.automationecom.click,https://cinehome.apps.ocp01.npd.co"
    SEED_DEMO_DATA: "true"
  # Keys lấy từ appSecretName
  secretEnvKeys:
    - DATABASE_URL
    - REDIS_URL
    - MINIO_ACCESS_KEY
    - MINIO_SECRET_KEY

movieWeb:
  enabled: true
  replicaCount: 1
  image:
    repository: harbor-platform.apps.ocp01.npd.co/movie-web/movie-web
    tag: "latest"
    pullPolicy: Always
  service:
    port: 8080
  env:
    API_PROXY_TARGET: "http://movie-api:8080"
    # Proxy media (HLS/poster) tới MinIO nội bộ — browser không nói chuyện trực tiếp với MinIO
    MEDIA_PROXY_TARGET: "http://minio.minio.svc.cluster.local:9000"
    PORT: "8080"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

mediaWorker:
  enabled: true
  replicaCount: 1
  workVolumeSize: 4Gi
  image:
    repository: harbor-platform.apps.ocp01.npd.co/movie-web/media-worker
    tag: "latest"
    pullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  env:
    MINIO_ENDPOINT: "minio.minio.svc.cluster.local:9000"
    MINIO_SECURE: "false"
    MINIO_BUCKET_MOVIES: "movies"
    MINIO_BUCKET_RAW: "raw"
    MEDIA_QUEUE: "cinehome:media:jobs"
    WORK_DIR: "/tmp/cinehome-work"
    REDIS_SENTINEL_MASTER: "mymaster"
    REDIS_SENTINEL_PORT: "26379"
  secretEnvKeys:
    - DATABASE_URL
    - REDIS_URL
    - MINIO_ACCESS_KEY
    - MINIO_SECRET_KEY
