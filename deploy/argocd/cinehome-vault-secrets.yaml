# Argo — ExternalSecret CineHome (KHÔNG ghi đè secret redis-ha / postgres-ha-postgresql)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cinehome-eso-app
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: cinehome
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: cinehome-platform
  source:
    repoURL: https://github.com/kevinram164/movie-web.git
    targetRevision: main
    path: phase9-gitops-platform/vault/external-secrets/cinehome
    directory:
      include: app-external-secret.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: npd-movie
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
---
