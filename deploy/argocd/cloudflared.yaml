apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cinehome-cloudflared
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: cinehome
    app.kubernetes.io/component: tunnel
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: cinehome-platform
  source:
    repoURL: https://github.com/kevinram164/movie-web.git
    targetRevision: main
    path: deploy/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: npd-movie
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
