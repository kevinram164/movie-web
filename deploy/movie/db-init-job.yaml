# Tạo DB/user movie trên Postgres HA (chạy 1 lần sau khi postgres Ready)
apiVersion: batch/v1
kind: Job
metadata:
  name: movie-db-init
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: cinehome
    app.kubernetes.io/component: db-init
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: bitnami/postgresql:16
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-ha-postgresql
                  key: postgres-password
          command:
            - /bin/bash
            - -c
            - |
              set -e
              HOST=postgres-ha-postgresql.postgres.svc.cluster.local
              psql -h "$HOST" -U postgres -d postgres <<'SQL'
              SELECT 'ok' WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'movie');
              DO $$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'movie') THEN
                  CREATE ROLE movie LOGIN PASSWORD 'movie';
                END IF;
              END
              $$;
              SELECT 'create db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'movie');
              SQL
              psql -h "$HOST" -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='movie'" | grep -q 1 \
                || psql -h "$HOST" -U postgres -d postgres -c "CREATE DATABASE movie OWNER movie;"
              psql -h "$HOST" -U postgres -d movie -c "GRANT ALL ON SCHEMA public TO movie;"
              echo "movie database ready"
