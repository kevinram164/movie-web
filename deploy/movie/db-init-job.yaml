# Tạo DB/user movie trên Postgres HA *dùng chung* (không đụng user banking)
# Admin: Secret postgres-ha-postgresql (đã có trên cluster)
# Password user movie: Secret cinehome-movie-db (Vault → ESO), key password
apiVersion: batch/v1
kind: Job
metadata:
  name: movie-db-init
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: cinehome
    app.kubernetes.io/component: db-init
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: docker.io/bitnamilegacy/postgresql:16.4.0-debian-12-r9
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-ha-postgresql
                  key: postgres-password
            - name: MOVIE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cinehome-movie-db
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              HOST=postgres-ha-postgresql-primary.postgres.svc.cluster.local
              PASS_SQL=${MOVIE_PASSWORD//\'/\'\'}
              psql -h "$HOST" -U postgres -d postgres -v ON_ERROR_STOP=1 -c \
                "DO \$\$ BEGIN
                   IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'movie') THEN
                     CREATE ROLE movie LOGIN PASSWORD '${PASS_SQL}';
                   ELSE
                     ALTER ROLE movie WITH LOGIN PASSWORD '${PASS_SQL}';
                   END IF;
                 END \$\$;"
              psql -h "$HOST" -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='movie'" | grep -q 1 \
                || psql -h "$HOST" -U postgres -d postgres -c "CREATE DATABASE movie OWNER movie;"
              psql -h "$HOST" -U postgres -d movie -c "GRANT ALL ON SCHEMA public TO movie;"
              echo "movie database ready (shared postgres-ha; banking untouched)"
