# MinIO Bitnami — PVC trên nfs-csi
# Deploy qua ArgoCD Application infra-minio

mode: standalone

auth:
  rootUser: minioadmin
  rootPassword: "ChangeMeMinioMovie2026!"

defaultBuckets: "movies,posters"

persistence:
  enabled: true
  storageClass: nfs-csi
  size: 200Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001

# Public read cho HLS + poster (browser fetch trực tiếp)
# Policy apply bằng Job mc sau khi MinIO Ready — xem deploy/minio/bucket-policy-job.yaml
