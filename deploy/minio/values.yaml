# MinIO Bitnami — khớp OCP lab (bitnamilegacy, giống redis/postgres)
# Credentials: Vault → ESO Secret `minio` (root-user / root-password)
mode: standalone

global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/minio
  tag: 2025.7.23-debian-12-r5
  pullPolicy: IfNotPresent

auth:
  existingSecret: minio
  rootUserSecretKey: root-user
  rootPasswordSecretKey: root-password

defaultBuckets: "movies,posters,raw"

persistence:
  enabled: true
  storageClass: nfs-csi
  size: 200Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001

# Browser HLS / upload từ CineHome (Bitnami MinIO thường không hỗ trợ mc cors set)
extraEnvVars:
  - name: MINIO_API_CORS_ALLOW_ORIGIN
    value: "*"
