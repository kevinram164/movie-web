# MinIO Bitnami — credentials từ Vault → ESO Secret `minio` (không password trong Git)
mode: standalone

auth:
  existingSecret: minio
  rootUserSecretKey: root-user
  rootPasswordSecretKey: root-password

defaultBuckets: "movies,posters"

persistence:
  enabled: true
  storageClass: nfs-csi
  size: 200Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001
