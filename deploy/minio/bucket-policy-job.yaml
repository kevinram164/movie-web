# Job tạo bucket + public-read + CORS (HLS từ browser)
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-policy
  namespace: minio
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: cinehome
    app.kubernetes.io/component: minio-policy
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: docker.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: root-password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb -p local/movies || true
              mc mb -p local/posters || true
              mc mb -p local/raw || true
              mc anonymous set download local/movies
              mc anonymous set download local/posters
              cat > /tmp/cors.json <<'EOF'
              {
                "CORSRules": [{
                  "AllowedOrigins": ["*"],
                  "AllowedMethods": ["GET", "HEAD"],
                  "AllowedHeaders": ["*"],
                  "ExposeHeaders": ["ETag", "Content-Length", "Content-Type", "Accept-Ranges"],
                  "MaxAgeSeconds": 3600
                }]
              }
              EOF
              mc cors set local/movies /tmp/cors.json
              mc cors set local/posters /tmp/cors.json
              echo "bucket policy + cors ok"
