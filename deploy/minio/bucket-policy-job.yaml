# Job tạo bucket + public-read + CORS (HLS từ browser)
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-policy
  namespace: minio
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: cinehome
    app.kubernetes.io/component: minio-policy
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: docker.io/minio/mc:latest
          env:
            - name: HOME
              value: /tmp
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: root-password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /tmp/.mc
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb -p local/movies || true
              mc mb -p local/posters || true
              mc mb -p local/raw || true
              mc anonymous set download local/movies
              mc anonymous set download local/posters
              # Bitnami/legacy: PutBucketCors thường lỗi EOF — CORS set bằng MINIO_API_CORS_ALLOW_ORIGIN trên pod MinIO
              cat > /tmp/cors.xml <<'EOF'
              <CORSConfiguration>
                <CORSRule>
                  <AllowedOrigin>*</AllowedOrigin>
                  <AllowedMethod>GET</AllowedMethod>
                  <AllowedMethod>HEAD</AllowedMethod>
                  <AllowedMethod>PUT</AllowedMethod>
                  <AllowedMethod>POST</AllowedMethod>
                  <AllowedHeader>*</AllowedHeader>
                  <ExposeHeader>ETag</ExposeHeader>
                  <MaxAgeSeconds>3600</MaxAgeSeconds>
                </CORSRule>
              </CORSConfiguration>
              EOF
              # bỏ indentation trong file (heredoc bị indent trong YAML)
              sed -i 's/^[[:space:]]*//' /tmp/cors.xml
              mc cors set local/movies /tmp/cors.xml 2>/dev/null || echo "(warn) cors movies skipped — dùng MINIO_API_CORS_ALLOW_ORIGIN"
              mc cors set local/posters /tmp/cors.xml 2>/dev/null || echo "(warn) cors posters skipped"
              mc cors set local/raw /tmp/cors.xml 2>/dev/null || echo "(warn) cors raw skipped"
              echo "bucket policy + cors ok"
